name: Remove sidebar mass merge and export buttons

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/remove-sidebar-buttons.yml

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Patch index.html directly
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')
          marker = 'ELITE-SIDEBAR-CLEANUP-MASS-MERGE-EXPORT-V2'

          cleanup = '''
<script id="ELITE-SIDEBAR-CLEANUP-MASS-MERGE-EXPORT-V2">
(function(){
  function compactText(value){
    return String(value || '').replace(/\s+/g, ' ').trim().toLowerCase();
  }
  function isTargetControl(el){
    var text = compactText(el.textContent);
    var attrs = compactText([
      el.getAttribute('aria-label'),
      el.getAttribute('title'),
      el.getAttribute('data-action'),
      el.getAttribute('onclick'),
      el.id,
      el.className
    ].join(' '));
    var haystack = text + ' ' + attrs;
    return /mass\s*merge/.test(haystack) || /export/.test(haystack);
  }
  function sidebarAncestor(el){
    if(!el || !el.closest) return null;
    return el.closest('aside, nav, [id*=side i], [class*=side i], [id*=sidebar i], [class*=sidebar i], [id*=rail i], [class*=rail i]');
  }
  function removeSidebarMassMergeAndExportButtons(){
    document.querySelectorAll('button, a, [role="button"], .btn, .nav-btn').forEach(function(el){
      if(sidebarAncestor(el) && isTargetControl(el)){
        var row = el.closest('li, .nav-item, .sidebar-item, .side-item, .action-row, .quick-action, .tool-row') || el;
        row.remove();
      }
    });
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', removeSidebarMassMergeAndExportButtons);
  } else {
    removeSidebarMassMergeAndExportButtons();
  }
  [0,100,500,1000,2000].forEach(function(ms){ setTimeout(removeSidebarMassMergeAndExportButtons, ms); });
  try {
    new MutationObserver(removeSidebarMassMergeAndExportButtons).observe(document.documentElement, {childList:true, subtree:true});
  } catch(e) {}
})();
</script>
'''

          # Remove the previous attempted cleanup if present.
          old_start = html.find('<script id=\\"ELITE-SIDEBAR-CLEANUP-MASS-MERGE-EXPORT\\">')
          if old_start != -1:
              old_end = html.find('</script>', old_start)
              if old_end != -1:
                  html = html[:old_start] + html[old_end + len('</script>'):]

          if marker not in html:
              if '</body>' in html:
                  html = html.replace('</body>', cleanup + '\n</body>', 1)
              else:
                  html = html + '\n' + cleanup + '\n'
              path.write_text(html, encoding='utf-8')
              print('Inserted V2 sidebar cleanup block into index.html')
          else:
              print('V2 sidebar cleanup block already present')
          PY

      - name: Commit and push patched index.html
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          if ! git diff --quiet -- index.html; then
            git add index.html
            git commit -m "Hide sidebar mass merge and export buttons"
            git push origin HEAD:main
          else
            echo "No index.html changes detected."
          fi
