name: Remove sidebar mass merge and export buttons

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/remove-sidebar-buttons.yml

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Patch index.html directly
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')
          marker = 'ELITE-SIDEBAR-CLEANUP-MASS-MERGE-EXPORT-V3'

          cleanup = '''
<script id="ELITE-SIDEBAR-CLEANUP-MASS-MERGE-EXPORT-V3">
(function(){
  function compactText(value){
    return String(value || '').replace(/\s+/g, ' ').trim().toLowerCase();
  }
  function classText(el){
    try { return typeof el.className === 'string' ? el.className : ''; }
    catch(e) { return ''; }
  }
  function matchesTarget(el){
    var haystack = compactText([
      el.textContent,
      el.getAttribute && el.getAttribute('aria-label'),
      el.getAttribute && el.getAttribute('title'),
      el.getAttribute && el.getAttribute('data-action'),
      el.getAttribute && el.getAttribute('onclick'),
      el.id,
      classText(el)
    ].join(' '));
    return /mass\s*merge/.test(haystack) || /\bexport\b/.test(haystack);
  }
  function isSidebarNode(node){
    while(node && node !== document.documentElement){
      var tag = compactText(node.tagName);
      var id = compactText(node.id);
      var cls = compactText(classText(node));
      if(tag === 'aside' || tag === 'nav') return true;
      if(id.indexOf('side') !== -1 || id.indexOf('sidebar') !== -1 || id.indexOf('rail') !== -1) return true;
      if(cls.indexOf('side') !== -1 || cls.indexOf('sidebar') !== -1 || cls.indexOf('rail') !== -1 || cls.indexOf('nav') !== -1) return true;
      node = node.parentElement;
    }
    return false;
  }
  function removeButtons(){
    var controls = document.querySelectorAll('button, a, [role="button"], .btn, .nav-btn');
    controls.forEach(function(el){
      if(isSidebarNode(el) && matchesTarget(el)){
        var row = el.closest ? (el.closest('li, .nav-item, .sidebar-item, .side-item, .action-row, .quick-action, .tool-row') || el) : el;
        row.remove();
      }
    });
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', removeButtons);
  } else {
    removeButtons();
  }
  [0,100,500,1000,2000].forEach(function(ms){ setTimeout(removeButtons, ms); });
  try {
    new MutationObserver(removeButtons).observe(document.documentElement, {childList:true, subtree:true});
  } catch(e) {}
})();
</script>
'''

          html = re.sub(r'\n?<script id="ELITE-SIDEBAR-CLEANUP-MASS-MERGE-EXPORT(?:-V\d+)?">[\s\S]*?</script>\n?', '\n', html)

          if marker not in html:
              if '</body>' in html:
                  html = html.replace('</body>', cleanup + '\n</body>', 1)
              else:
                  html = html + '\n' + cleanup + '\n'
              path.write_text(html, encoding='utf-8')
              print('Inserted V3 sidebar cleanup block into index.html')
          else:
              print('V3 sidebar cleanup block already present')
          PY

      - name: Commit and push patched index.html
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git status --short
          if ! git diff --quiet -- index.html; then
            git add index.html
            git commit -m "Hide sidebar mass merge and export buttons"
            git push origin HEAD:main
          else
            echo "No index.html changes detected."
          fi
