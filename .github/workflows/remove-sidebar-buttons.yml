name: Patch sidebar buttons

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/remove-sidebar-buttons.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Update index.html
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          marker = 'SIDEBAR_BUTTON_CLEANER_FINAL'
          block = '''
<script id="SIDEBAR_BUTTON_CLEANER_FINAL">
(function(){
  function norm(v){ return String(v == null ? '' : v).replace(/[ \t\r\n]+/g, ' ').toLowerCase(); }
  function attr(n,k){ try { return n.getAttribute ? n.getAttribute(k) : ''; } catch(e) { return ''; } }
  function cls(n){ try { return typeof n.className === 'string' ? n.className : ''; } catch(e) { return ''; } }
  function sidebar(n){
    while(n && n !== document.documentElement){
      var t = norm(n.tagName), id = norm(n.id), c = norm(cls(n));
      if(t === 'aside' || t === 'nav') return true;
      if(id.indexOf('side') >= 0 || id.indexOf('rail') >= 0) return true;
      if(c.indexOf('side') >= 0 || c.indexOf('rail') >= 0 || c.indexOf('nav') >= 0) return true;
      n = n.parentNode;
    }
    return false;
  }
  function control(n){
    var t = norm(n.tagName), c = norm(cls(n)), r = norm(attr(n,'role'));
    return t === 'button' || t === 'a' || r === 'button' || c.indexOf('btn') >= 0;
  }
  function target(n){
    var x = norm([n.textContent, attr(n,'aria-label'), attr(n,'title'), attr(n,'onclick'), attr(n,'data-action'), n.id, cls(n)].join(' '));
    return x.indexOf('mass merge') >= 0 || x.indexOf('massmerge') >= 0 || x.indexOf('export') >= 0;
  }
  function row(n){
    var cur = n;
    while(cur && cur.parentNode && cur !== document.body){
      var t = norm(cur.tagName), c = norm(cls(cur));
      if(t === 'li' || c.indexOf('nav-item') >= 0 || c.indexOf('sidebar-item') >= 0 || c.indexOf('side-item') >= 0 || c.indexOf('action-row') >= 0) return cur;
      cur = cur.parentNode;
    }
    return n;
  }
  function clean(){
    var all = document.getElementsByTagName('*'), found = [], i;
    for(i = 0; i < all.length; i++) if(control(all[i]) && sidebar(all[i]) && target(all[i])) found.push(row(all[i]));
    for(i = 0; i < found.length; i++) if(found[i] && found[i].parentNode) found[i].parentNode.removeChild(found[i]);
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', clean); else clean();
  setTimeout(clean, 100); setTimeout(clean, 500); setTimeout(clean, 1500);
  try { new MutationObserver(clean).observe(document.documentElement, { childList: true, subtree: true }); } catch(e) {}
})();
</script>
'''
          if marker not in s:
              s = s.replace('</body>', block + '\n</body>') if '</body>' in s else s + block
              p.write_text(s, encoding='utf-8')
              print('patched index.html')
          else:
              print('already patched')
          PY

      - name: Commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- index.html; then
            git add index.html
            git commit -m "Remove sidebar buttons from live app"
            git push origin HEAD:main
          fi
